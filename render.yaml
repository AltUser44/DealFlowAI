# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: dealflow-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: MONGODB_URI
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
